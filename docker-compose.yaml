version: '3'
services:
  unifi-cam-proxy:
    build: .
    container_name: unifi-cam-proxy
    volumes:
      - './client.pem:/client.pem'
    environment:
      # UniFi Protect NVR settings
      - "UBIQUITI_ADDRESS=192.168.1.1"
      - "UBIQUITI_PORT=7442"
      - "UBIQUITI_MAC=AABBCCDDEEFF"
      # Camera settings
      - "CAMERA_HOST=192.168.1.100"
      - "CAMERA_USERNAME=admin"
      - "CAMERA_PASSWORD=password"
    restart: unless-stopped
    depends_on:
      - unifi-protect

  # UniFi Protect NVR (optional - for local testing)
  unifi-protect:
    image: fryfrog/unifi-protect
    container_name: unifi-protect
    ports:
      - '7080:7080'
      - '7442:7442'
      - '7443:7443'
      - '7444:7444'
      - '7447:7447'
      - '7550:7550'
    volumes:
      - './run/protect/data:/srv/unifi-protect'
      - './run/protect/db:/var/lib/postgresql/10/main'
      - './run/protect/db_config:/etc/postgresql/10/main'
      - './run/protect/config.json:/usr/share/unifi-protect/app/config/config.json'
    environment:
      - TZ=America/Los_Angeles
      - PUID=999
      - PGID=999
      - PUID_POSTGRES=102
      - PGID_POSTGRES=104
